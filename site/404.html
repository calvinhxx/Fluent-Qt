<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fluent-Qt — 页面未找到</title>
    <meta name="theme-color" content="#e3ebf2">
    <link rel="icon" href="assets/app-icon.png">
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("fluent-qt-theme");
          const theme = saved === "dark" || saved === "light"
            ? saved
            : (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          document.querySelector("meta[name='theme-color']").content = theme === "dark" ? "#070c12" : "#e3ebf2";
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="error-page">
    <main class="error-card">
      <p class="section-index">404 / NOT FOUND</p>
      <h1>在控件树里<br>走丢了。</h1>
      <p>这个页面不存在，但 Fluent-Qt 项目还在原处。</p>
      <a class="button button-primary" href="./">返回首页</a>
    </main>
  </body>
</html>

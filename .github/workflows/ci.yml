name: CI
run-name: CI ${{ github.event_name == 'schedule' && 'full' || github.event.inputs.matrix || 'fast' }}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      matrix:
        description: Validation tier to run.
        required: true
        default: fast
        type: choice
        options:
          - fast
          - full
  schedule:
    # Weekly full validation matrix. Times are UTC.
    - cron: "23 18 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  plan:
    name: Plan validation matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      mode: ${{ steps.matrix.outputs.mode }}
      should_build: ${{ steps.changes.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate package catalog
        shell: bash
        run: python3 .github/scripts/validate-package-matrix.py

      - name: Detect documentation-only pull request
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          should_build=true
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            changed_files="$(
              gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
                --jq '.[].filename'
            )"
            if [[ -z "$changed_files" ]]; then
              echo "::error::The pull request did not report any changed files."
              exit 1
            fi

            should_build=false
            while IFS= read -r file; do
              case "$file" in
                *.md|docs/*|site/*|LICENSE|LICENSE.*|.github/ISSUE_TEMPLATE/*)
                  ;;
                *)
                  should_build=true
                  break
                  ;;
              esac
            done <<< "$changed_files"
          fi

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          if [[ "$should_build" == "true" ]]; then
            echo "The build matrix is required."
          else
            echo "Documentation-only pull request: skipping the build matrix."
          fi

      - name: Select validation tier
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          mode="fast"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            mode="full"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mode="${{ github.event.inputs.matrix }}"
          fi

          case "$mode" in
            fast|full) ;;
            *)
              echo "::error::Unsupported validation tier: $mode"
              exit 1
              ;;
          esac

          if [[ "$mode" == "fast" ]]; then
            matrix="$(jq -c . <<'JSON'
          {
            "include": [
              {
                "id": "linux-x64-qt62-fast",
                "name": "Linux x64 / Qt 6.2 fast",
                "os": "ubuntu-22.04",
                "preset": "vcpkg-linux",
                "qt_version": "6.2.4",
                "qt_source": "apt",
                "qt_arch": "",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "x64-linux",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_fast_tests",
                "build_parallel": "4",
                "test_labels": "^ci_fast$",
                "exclude_labels": "^(manual_visual|local_desktop)$",
                "ctest_timeout": 180,
                "timeout_minutes": 30,
                "configure_args": "",
                "windows_arm64_cross": false
              },
              {
                "id": "win-x64-qt62-fast",
                "name": "Windows x64 / Qt 6.2 fast",
                "os": "windows-2022",
                "preset": "vcpkg-windows",
                "qt_version": "6.2.4",
                "qt_source": "aqt",
                "qt_arch": "win64_msvc2019_64",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "x64-windows",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_fast_tests",
                "build_parallel": "",
                "test_labels": "^ci_fast$",
                "exclude_labels": "^(manual_visual|local_desktop)$",
                "ctest_timeout": 180,
                "timeout_minutes": 30,
                "configure_args": "",
                "windows_arm64_cross": false
              },
              {
                "id": "mac-arm64-qt62-build",
                "name": "macOS arm64 / Qt 6.2 build",
                "os": "macos-15",
                "preset": "vcpkg-osx",
                "qt_version": "6.2.4",
                "qt_source": "aqt",
                "qt_arch": "clang_64",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "arm64-osx",
                "build": true,
                "test": false,
                "build_targets": "FluentQt",
                "build_parallel": "3",
                "test_labels": "",
                "exclude_labels": "",
                "ctest_timeout": 180,
                "timeout_minutes": 30,
                "configure_args": "-DBUILD_TESTING=OFF",
                "windows_arm64_cross": false
              }
            ]
          }
          JSON
            )"
          else
            matrix="$(jq -c . <<'JSON'
          {
            "include": [
              {
                "id": "linux-x64-qt62-full",
                "name": "Linux x64 / Qt 6.2 full tests",
                "os": "ubuntu-22.04",
                "preset": "vcpkg-linux",
                "qt_version": "6.2.4",
                "qt_source": "apt",
                "qt_arch": "",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "x64-linux",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_full_tests fluent_qt_gallery",
                "build_parallel": "4",
                "test_labels": "^ci_full$",
                "exclude_labels": "^(manual_visual|local_desktop)$",
                "ctest_timeout": 240,
                "timeout_minutes": 45,
                "configure_args": "",
                "package": true,
                "package_arch": "x64",
                "package_build_preset": "vcpkg-linux-release",
                "package_preset": "vcpkg-linux-deb",
                "windows_arm64_cross": false
              },
              {
                "id": "linux-arm64-qt62-full",
                "name": "Linux ARM64 / Qt 6.2 full tests",
                "os": "ubuntu-22.04-arm",
                "preset": "vcpkg-linux-arm64",
                "qt_version": "6.2.4",
                "qt_source": "apt",
                "qt_arch": "",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "arm64-linux",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_full_tests fluent_qt_gallery",
                "build_parallel": "4",
                "test_labels": "^ci_full$",
                "exclude_labels": "^(manual_visual|local_desktop)$",
                "ctest_timeout": 240,
                "timeout_minutes": 45,
                "configure_args": "",
                "native_arm64": true,
                "linux_xcb_smoke": true,
                "package": true,
                "package_arch": "arm64",
                "package_build_preset": "vcpkg-linux-arm64-release",
                "package_preset": "vcpkg-linux-arm64-deb",
                "windows_arm64_cross": false
              },
              {
                "id": "linux-x64-qt515-full",
                "name": "Linux x64 / Qt 5.15 full tests",
                "os": "ubuntu-22.04",
                "preset": "vcpkg-linux",
                "qt_version": "5.15.2",
                "qt_source": "aqt",
                "qt_arch": "gcc_64",
                "qt_archives": "qtbase icu",
                "host_qt_arch": "",
                "vcpkg_triplet": "x64-linux",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_full_tests",
                "build_parallel": "4",
                "test_labels": "^ci_full$",
                "exclude_labels": "^(manual_visual|local_desktop)$",
                "ctest_timeout": 240,
                "timeout_minutes": 45,
                "configure_args": "",
                "windows_arm64_cross": false
              },
              {
                "id": "mac-arm64-qt62-full",
                "name": "macOS arm64 / Qt 6.2 full tests",
                "os": "macos-15",
                "preset": "vcpkg-osx",
                "qt_version": "6.2.4",
                "qt_source": "aqt",
                "qt_arch": "clang_64",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "arm64-osx",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_full_tests",
                "build_parallel": "3",
                "test_labels": "^ci_full$",
                "exclude_labels": "^(manual_visual|local_desktop)$",
                "ctest_timeout": 240,
                "timeout_minutes": 90,
                "configure_args": "",
                "windows_arm64_cross": false
              },
              {
                "id": "mac-x64-qt62-gallery",
                "name": "macOS x64 / Qt 6.2 gallery smoke",
                "os": "macos-15-intel",
                "preset": "vcpkg-osx-x64",
                "qt_version": "6.2.4",
                "qt_source": "aqt",
                "qt_arch": "clang_64",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "x64-osx",
                "build": true,
                "test": false,
                "build_targets": "fluent_qt_gallery",
                "build_parallel": "",
                "test_labels": "",
                "exclude_labels": "",
                "ctest_timeout": 180,
                "timeout_minutes": 40,
                "configure_args": "-DBUILD_TESTING=OFF",
                "windows_arm64_cross": false
              },
              {
                "id": "win-x64-qt62-platform",
                "name": "Windows x64 / Qt 6.2 platform targeted",
                "os": "windows-2022",
                "preset": "vcpkg-windows",
                "qt_version": "6.2.4",
                "qt_source": "aqt",
                "qt_arch": "win64_msvc2019_64",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "x64-windows",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_windows_platform_tests",
                "build_parallel": "",
                "test_labels": "^(ci_fast|platform_windows)$",
                "exclude_labels": "^manual_visual$",
                "ctest_timeout": 180,
                "timeout_minutes": 45,
                "configure_args": "",
                "windows_arm64_cross": false
              },
              {
                "id": "win-x64-qt515-api",
                "name": "Windows x64 / Qt 5.15 API smoke",
                "os": "windows-2022",
                "preset": "vcpkg-windows",
                "qt_version": "5.15.2",
                "qt_source": "aqt",
                "qt_arch": "win64_msvc2019_64",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "x64-windows",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_fast_tests",
                "build_parallel": "",
                "test_labels": "^ci_fast$",
                "exclude_labels": "^(manual_visual|local_desktop)$",
                "ctest_timeout": 180,
                "timeout_minutes": 30,
                "configure_args": "",
                "windows_arm64_cross": false
              },
              {
                "id": "win-arm64-qt693-native",
                "name": "Windows ARM64 / Qt 6.9.3 native platform tests",
                "os": "windows-11-arm",
                "preset": "vcpkg-windows-arm64",
                "qt_version": "6.9.3",
                "qt_source": "aqt",
                "qt_arch": "win64_msvc2022_arm64",
                "qt_archives": "",
                "host_qt_arch": "",
                "vcpkg_triplet": "arm64-windows",
                "build": true,
                "test": true,
                "build_targets": "fluent_qt_ci_windows_platform_tests fluent_qt_gallery",
                "build_parallel": "",
                "test_labels": "^(ci_fast|platform_windows)$",
                "exclude_labels": "^(manual_visual|local_desktop)$",
                "ctest_timeout": 180,
                "timeout_minutes": 60,
                "configure_args": "",
                "native_arm64": true,
                "gallery_smoke": true,
                "qt_qpa_platform": "windows",
                "windows_arm64_native": true,
                "windows_arm64_cross": false
              },
              {
                "id": "win-arm64-qt693-cross",
                "name": "Windows ARM64 / Qt 6.9.3 installer package",
                "os": "windows-2022",
                "preset": "vcpkg-windows-arm64-release",
                "qt_version": "6.9.3",
                "qt_source": "aqt",
                "qt_arch": "win64_msvc2022_arm64_cross_compiled",
                "qt_archives": "",
                "host_qt_arch": "win64_msvc2022_64",
                "vcpkg_triplet": "arm64-windows",
                "build": true,
                "test": false,
                "build_targets": "fluent_qt_gallery",
                "build_parallel": "",
                "test_labels": "",
                "exclude_labels": "",
                "ctest_timeout": 180,
                "timeout_minutes": 75,
                "configure_args": "",
                "windows_package": true,
                "package_preset": "vcpkg-windows-arm64-installer",
                "windows_arm64_cross": true
              }
            ]
          }
          JSON
            )"
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Selected $mode validation matrix."

  build:
    name: ${{ matrix.name }}
    needs: plan
    if: ${{ needs.plan.outputs.should_build == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-binary-cache,readwrite"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify native ARM64 runner
        if: ${{ matrix.native_arm64 == true }}
        shell: pwsh
        run: |
          if ("${{ runner.arch }}" -ne "ARM64") {
            throw "Expected an ARM64 runner, got '${{ runner.arch }}'."
          }

      - name: Prepare vcpkg binary cache
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: .vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.vcpkg_triplet }}-
            vcpkg-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Linux system packages
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: bash .github/scripts/install-linux-dependencies.sh "${{ matrix.qt_source }}"

      - name: Install NSIS for Windows packaging
        if: ${{ matrix.windows_package == true }}
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install host Qt ${{ matrix.qt_version }}
        if: ${{ matrix.qt_source == 'aqt' && matrix.windows_arm64_cross == true }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.host_qt_arch }}
          cache: true

      - name: Remember host Qt path
        if: ${{ matrix.windows_arm64_cross == true }}
        shell: pwsh
        run: |
          $qtHostPath = $env:QT_ROOT_DIR -replace '\\', '/'
          "QT_HOST_PATH=$qtHostPath" >> $env:GITHUB_ENV

      - name: Install Qt ${{ matrix.qt_version }}
        if: ${{ matrix.qt_source == 'aqt' && matrix.qt_archives == '' && matrix.windows_arm64_native != true }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Install native Windows ARM64 Qt ${{ matrix.qt_version }}
        if: ${{ matrix.qt_source == 'aqt' && matrix.windows_arm64_native == true }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          host: windows_arm64
          arch: ${{ matrix.qt_arch }}
          cache: true
          setup-python: false

      - name: Install Qt ${{ matrix.qt_version }} archives
        if: ${{ matrix.qt_source == 'aqt' && matrix.qt_archives != '' }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          archives: ${{ matrix.qt_archives }}
          cache: true

      - name: Configure Linux Qt runtime path
        if: ${{ runner.os == 'Linux' && matrix.qt_source == 'aqt' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${QT_ROOT_DIR:-}" ]]; then
            echo "LD_LIBRARY_PATH=${QT_ROOT_DIR}/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
            echo "QT_PLUGIN_PATH=${QT_ROOT_DIR}/plugins" >> "$GITHUB_ENV"
            echo "QT_QPA_PLATFORM_PLUGIN_PATH=${QT_ROOT_DIR}/plugins/platforms" >> "$GITHUB_ENV"
          fi

      - name: Set VCPKG_ROOT
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set on this runner."
          }
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure
        if: ${{ matrix.windows_arm64_cross != true }}
        shell: pwsh
        run: |
          $configureArgs = @("--preset", "${{ matrix.preset }}")
          if ($env:QT_ROOT_DIR) {
            $qtRoot = $env:QT_ROOT_DIR -replace '\\', '/'
            $configureArgs += @("-D", "CMAKE_PREFIX_PATH=$qtRoot")
          }
          $extraArgs = "${{ matrix.configure_args }}"
          if ($extraArgs) {
            $configureArgs += $extraArgs -split " "
          }
          cmake @configureArgs

      - name: Configure Windows ARM64 cross-build
        if: ${{ matrix.windows_arm64_cross == true }}
        shell: pwsh
        run: |
          $qtRoot = $env:QT_ROOT_DIR -replace '\\', '/'
          $qtHost = $env:QT_HOST_PATH -replace '\\', '/'
          $configureArgs = @("--preset", "${{ matrix.preset }}", "-D", "CMAKE_PREFIX_PATH=$qtRoot", "-D", "QT_HOST_PATH=$qtHost")
          $extraArgs = "${{ matrix.configure_args }}"
          if ($extraArgs) {
            $configureArgs += $extraArgs -split " "
          }
          cmake @configureArgs

      - name: Validate generated Linux desktop entry
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: desktop-file-validate build/${{ matrix.preset }}/app/*.desktop

      - name: Build
        if: ${{ matrix.build == true }}
        shell: pwsh
        env:
          QT_QPA_PLATFORM: ${{ matrix.qt_qpa_platform || 'offscreen' }}
          SKIP_VISUAL_TEST: 1
        run: |
          $buildArgs = @("--build", "--preset", "${{ matrix.preset }}")
          $buildTargets = "${{ matrix.build_targets }}"
          if ($buildTargets) {
            $buildArgs += "--target"
            $buildArgs += $buildTargets -split " "
          }
          $buildParallel = "${{ matrix.build_parallel }}"
          if ($buildParallel) {
            $buildArgs += @("--parallel", $buildParallel)
          } else {
            $buildArgs += "--parallel"
          }
          cmake @buildArgs

      - name: Smoke launch native Windows ARM64 Gallery
        if: ${{ matrix.windows_arm64_native == true && matrix.gallery_smoke == true }}
        shell: pwsh
        env:
          QT_QPA_PLATFORM: windows
          SKIP_VISUAL_TEST: 1
        run: |
          $gallery = Get-ChildItem -Path "build/${{ matrix.preset }}/app" -Recurse -Filter fluent_qt_gallery.exe |
            Select-Object -First 1
          if (-not $gallery) {
            throw "The Windows ARM64 Gallery executable was not found."
          }

          $process = $null
          try {
            $process = Start-Process -FilePath $gallery.FullName -PassThru
            Start-Sleep -Seconds 5
            if ($process.HasExited) {
              throw "The Windows ARM64 Gallery exited during smoke launch with code $($process.ExitCode)."
            }
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Smoke launch native Linux ARM64 Gallery with X11
        if: ${{ matrix.linux_xcb_smoke == true }}
        shell: bash
        env:
          QT_QPA_PLATFORM: xcb
          SKIP_VISUAL_TEST: 1
        run: |
          set -euo pipefail
          gallery="build/${{ matrix.preset }}/app/fluent_qt_gallery"
          if [[ ! -x "$gallery" ]]; then
            echo "::error::The Linux ARM64 Gallery executable was not found: $gallery"
            exit 1
          fi

          xvfb-run -a sh -c '
            "$1" &
            pid=$!
            trap "kill $pid 2>/dev/null || true" EXIT
            sleep 5
            kill -0 "$pid"
          ' sh "$gallery"

      - name: Test
        if: ${{ matrix.build == true && matrix.test == true }}
        shell: pwsh
        env:
          QT_QPA_PLATFORM: ${{ matrix.qt_qpa_platform || 'offscreen' }}
          SKIP_VISUAL_TEST: 1
        run: |
          $testArgs = @(
            "--preset", "${{ matrix.preset }}",
            "--output-on-failure",
            "--timeout", "${{ matrix.ctest_timeout }}",
            "--no-tests=error"
          )
          $testLabels = "${{ matrix.test_labels }}"
          $excludeLabels = "${{ matrix.exclude_labels }}"
          if ($testLabels) {
            $testArgs += @("-L", $testLabels)
          }
          if ($excludeLabels) {
            $testArgs += @("-LE", $excludeLabels)
          }
          ctest @testArgs

      - name: Configure Linux Gallery package
        if: ${{ matrix.package == true }}
        shell: bash
        run: cmake --preset "${{ matrix.package_build_preset }}"

      - name: Build Linux Gallery package
        if: ${{ matrix.package == true }}
        shell: bash
        run: cmake --build --preset "${{ matrix.package_build_preset }}" --target fluent_qt_gallery --parallel 4

      - name: Package Linux Gallery
        if: ${{ matrix.package == true }}
        shell: bash
        run: cpack --preset "${{ matrix.package_preset }}"

      - name: Verify Linux Gallery package metadata
        if: ${{ matrix.package == true }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(build/${{ matrix.package_build_preset }}/*.deb)
          if (( ${#packages[@]} != 1 )); then
            echo "::error::Expected exactly one DEB package, found ${#packages[@]}."
            exit 1
          fi

          dpkg-deb --field "${packages[0]}" Architecture Depends Recommends
          depends="$(dpkg-deb --field "${packages[0]}" Depends)"
          if [[ "$depends" != *qt6-qpa-plugins* ]]; then
            echo "::error::The DEB package does not depend on qt6-qpa-plugins."
            exit 1
          fi

      - name: Upload Linux Gallery package
        if: ${{ matrix.package == true }}
        uses: actions/upload-artifact@v4
        with:
          name: fluent-qt-gallery-linux-${{ matrix.package_arch }}-deb
          retention-days: 14
          path: |
            build/${{ matrix.package_build_preset }}/*.deb
          if-no-files-found: error

      - name: Package Windows ARM64 Gallery
        if: ${{ matrix.windows_package == true }}
        shell: pwsh
        run: |
          # Keep CPack's NSIS staging tree short. Qt's nested runtime paths can
          # otherwise exceed the legacy path limit used by makensis.
          $packageOutput = Join-Path $env:RUNNER_TEMP "fq-win-arm64"
          & cpack --preset "${{ matrix.package_preset }}" -B $packageOutput
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            Get-ChildItem -LiteralPath $packageOutput -Filter NSISOutput.log -Recurse `
              -ErrorAction SilentlyContinue |
              ForEach-Object { Get-Content -LiteralPath $_.FullName }
            exit $exitCode
          }

          $stagedGallery = Get-ChildItem `
            -LiteralPath (Join-Path $packageOutput "_CPack_Packages") `
            -Filter fluent_qt_gallery.exe -File -Recurse |
            Where-Object { $_.Directory.Name -eq "bin" } |
            Select-Object -First 1
          if (-not $stagedGallery) {
            throw "The staged Windows ARM64 Gallery executable was not found."
          }
          & "$env:GITHUB_WORKSPACE/cmake/VerifyWindowsPeArchitecture.ps1" `
            -Root $stagedGallery.Directory.FullName `
            -ExpectedMachine Arm64 `
            -RequireMsvcRuntime

      - name: Upload Windows ARM64 Gallery installer
        if: ${{ matrix.windows_package == true }}
        uses: actions/upload-artifact@v4
        with:
          name: fluent-qt-gallery-windows-arm64-installer
          retention-days: 14
          path: |
            ${{ runner.temp }}/fq-win-arm64/*.exe
          if-no-files-found: error

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ needs.plan.outputs.mode }}-${{ matrix.id }}-diagnostics-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            build/${{ matrix.preset }}/CMakeCache.txt
            build/${{ matrix.preset }}/CMakeFiles/CMakeConfigureLog.yaml
            build/${{ matrix.preset }}/Testing/Temporary/LastTest.log
            build/${{ matrix.preset }}/Testing/Temporary/LastTestsFailed.log
            build/${{ matrix.preset }}/vcpkg-manifest-install.log
            build/${{ matrix.package_build_preset }}/CMakeCache.txt
            build/${{ matrix.package_build_preset }}/_CPack_Packages/**/*.log
            ${{ runner.temp }}/fq-win-arm64/_CPack_Packages/**/*.log
            build/${{ matrix.preset }}/vcpkg_installed/vcpkg/issue_body.md

  integration:
    name: Library integration ${{ matrix.name }}
    needs: plan
    if: ${{ needs.plan.outputs.should_build == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Qt 5.15
            qt_source: apt5
          - name: Qt 6.2
            qt_source: apt6
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt and build tools
        shell: bash
        run: bash .github/scripts/install-linux-dependencies.sh "${{ matrix.qt_source }}"

      - name: Configure external source-subproject integration
        shell: bash
        run: |
          cmake -S .github/integration -B build/integration-source \
            -DFLUENT_QT_SOURCE_DIR="$GITHUB_WORKSPACE" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_DISABLE_FIND_PACKAGE_spdlog=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_GTest=TRUE

      - name: Build external source-subproject integration
        shell: bash
        run: cmake --build build/integration-source --parallel 4

      - name: Install FluentQt development component
        shell: bash
        run: |
          cmake --install build/integration-source \
            --config Release \
            --component Development \
            --prefix "$RUNNER_TEMP/fluentqt"

      - name: Verify library-only CMake package
        shell: bash
        run: |
          set -euo pipefail
          package_dir="$RUNNER_TEMP/fluentqt/lib/cmake/FluentQt"
          test -f "$package_dir/FluentQtConfig.cmake"
          test -f "$package_dir/FluentQtTargets.cmake"
          if grep -R -E 'spdlog|fmt::|GTest|FluentQtLoggingSupport|support/logging' "$package_dir"; then
            echo "::error::Gallery or test dependencies leaked into the FluentQt package."
            exit 1
          fi

      - name: Configure installed-package integration
        shell: bash
        run: |
          cmake -S examples/hello_world -B build/integration-installed \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/fluentqt" \
            -DCMAKE_DISABLE_FIND_PACKAGE_spdlog=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_GTest=TRUE

      - name: Build installed-package integration
        shell: bash
        run: cmake --build build/integration-installed --parallel 4

      - name: Verify FluentQt library source package
        if: ${{ matrix.qt_source == 'apt6' }}
        shell: bash
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/source-package"
          cmake \
            -D "FLUENT_QT_SOURCE_DIR=$GITHUB_WORKSPACE" \
            -D "FLUENT_QT_SOURCE_PACKAGE_DIR=$output" \
            -D "FLUENT_QT_SOURCE_PACKAGE_VERSION=ci" \
            -P cmake/CreateSourcePackage.cmake
          archive="$output/FluentQt-ci-source.zip"
          test -f "$archive"
          if unzip -Z1 "$archive" | grep -E '/(app|tests|support)/'; then
            echo "::error::Non-library files leaked into the FluentQt source package."
            exit 1
          fi
          unzip -q "$archive" -d "$output/unpacked"
          cmake -S .github/integration -B build/integration-source-package \
            -DFLUENT_QT_SOURCE_DIR="$output/unpacked/FluentQt-ci-source" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_DISABLE_FIND_PACKAGE_spdlog=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_GTest=TRUE
          cmake --build build/integration-source-package --parallel 4

  ci-gate:
    name: CI Gate
    needs: [plan, build, integration]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required validation
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          SHOULD_BUILD: ${{ needs.plan.outputs.should_build }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$PLAN_RESULT" != "success" ]]; then
            echo "::error::CI planning finished with result: $PLAN_RESULT"
            exit 1
          fi
          if [[ "$SHOULD_BUILD" == "true" && "$BUILD_RESULT" != "success" ]]; then
            echo "::error::The required build matrix finished with result: $BUILD_RESULT"
            exit 1
          fi
          if [[ "$SHOULD_BUILD" == "true" && "$INTEGRATION_RESULT" != "success" ]]; then
            echo "::error::The external integration validation finished with result: $INTEGRATION_RESULT"
            exit 1
          fi

          if [[ "$SHOULD_BUILD" == "true" ]]; then
            echo "Required CI validation passed."
          else
            echo "Documentation-only pull request; the build matrix was not required."
          fi

  release-ready:
    name: Release ready
    needs: [plan, build, integration]
    if: ${{ always() && needs.plan.outputs.mode == 'full' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify full matrix
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
        shell: bash
        run: |
          if [[ "$BUILD_RESULT" != "success" ]]; then
            echo "::error::The full validation matrix finished with result: $BUILD_RESULT"
            exit 1
          fi
          if [[ "$INTEGRATION_RESULT" != "success" ]]; then
            echo "::error::The external integration validation finished with result: $INTEGRATION_RESULT"
            exit 1
          fi
